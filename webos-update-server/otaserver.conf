# webOS Community Update Server — configuration
#
# Loaded by config.py. Search order: /etc/otaserver.conf, then this file.
# For production, copy this to /etc/otaserver.conf and edit it there.
# Values shown are the built-in defaults; blank means "unset".

[server]
# uvicorn bind address and port. Behind a TLS reverse proxy in production,
# bind to 127.0.0.1 (the proxy faces the public interface).
host = 0.0.0.0
port = 8080

# Verbose logging. Set false in production.
debug = true

# Idle OMA DM session timeout, seconds.
session_timeout = 3600

[public]
# Public hostname used in the package download URLs handed to devices.
# Palm's original OTA host was omadm.swupdate.palm.com; we match "swupdate".
# LEAVE BLANK for local dev — the server auto-detects this host's LAN IP.
# For production set:  host = swupdate.webosarchive.org
host =

# Full base URL override (wins over host). Leave blank to derive from host:
#   host set -> https://<host> ; else -> http://<LAN IP>:<port>
url =

[logging]
# Optional persistent rotating access log. Blank = stdout / journald only.
# For production e.g.:  file = /var/log/webos-update-server.log
file =
